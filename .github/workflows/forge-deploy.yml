name: Forge Deploy (Reusable)

on:
  workflow_call:
    inputs:
      target-environment:
        description: Target Forge environment
        required: true
        type: string
      site-development:
        description: Confluence site for development
        required: true
        type: string
      site-staging:
        description: Confluence site for staging
        required: true
        type: string
      site-production:
        description: Confluence site for production
        required: true
        type: string
      forge-cli:
        description: Forge CLI package and version
        required: false
        default: "@forge/cli@12"
        type: string
      node-version:
        description: Node.js version for the workflow
        required: false
        default: "22"
        type: string
      run-install-non-production:
        description: Run forge install --upgrade for non-production environments
        required: false
        default: true
        type: boolean
      create-release-tag:
        description: Create and push forge-<env>-v<version> git tag for non-development
        required: false
        default: true
        type: boolean
      pre-build-command:
        description: Optional command to run before forge build when artifact is missing
        required: false
        default: ""
        type: string
    secrets:
      FORGE_EMAIL:
        required: true
      FORGE_API_TOKEN:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: forge-deploy-${{ github.repository }}-${{ inputs.target-environment }}
    environment: ${{ inputs.target-environment }}
    permissions:
      contents: write
    env:
      FORGE_CLI: ${{ inputs.forge-cli }}
      FORGE_EMAIL: ${{ secrets.FORGE_EMAIL }}
      FORGE_API_TOKEN: ${{ secrets.FORGE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Check out shared action
        uses: actions/checkout@v4
        with:
          repository: culmat/forge-ci
          ref: main
          path: _forge_ci

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - run: npx ${{ env.FORGE_CLI }} settings set usage-analytics true

      - name: Run shared deploy pipeline
        uses: ./_forge_ci/.github/actions/forge-deploy
        with:
          target-environment: ${{ inputs.target-environment }}
          site-development: ${{ inputs.site-development }}
          site-staging: ${{ inputs.site-staging }}
          site-production: ${{ inputs.site-production }}
          forge-cli: ${{ env.FORGE_CLI }}
          run-install-non-production: ${{ inputs.run-install-non-production }}
          create-release-tag: ${{ inputs.create-release-tag }}
          pre-build-command: ${{ inputs.pre-build-command }}
