name: Forge Deploy Pipeline
description: Build reuse aware Forge deploy pipeline

inputs:
  target-environment:
    description: Target Forge environment
    required: true
  site-development:
    description: Confluence site for development environment
    required: true
  site-staging:
    description: Confluence site for staging environment
    required: true
  site-production:
    description: Confluence site for production environment
    required: true
  forge-cli:
    description: Forge CLI package and version
    required: true
  run-install-non-production:
    description: Run install --upgrade for non-production environments
    required: false
    default: "true"
  create-release-tag:
    description: Create and push forge-<env>-v<version> tag for non-development
    required: false
    default: "true"
  pre-build-command:
    description: Optional command to run before forge build when artifact is missing
    required: false
    default: ""
  maintain-latest-version:
    description: |
      After a successful deploy, write the assigned Forge version to the
      `LATEST_VERSION` environment variable (with a semver guard so backports
      to older majors never overwrite a newer stored value). Consuming apps
      can read this var in a resolver and render an "upgrade available" hint.
    required: false
    default: "false"

outputs:
  environment:
    description: Resolved deploy environment
    value: ${{ steps.deploy.outputs.env }}
  version:
    description: Deployed Forge version
    value: ${{ steps.deploy.outputs.version }}
  build-action:
    description: Either reused or created
    value: ${{ steps.build_action.outputs.build_action }}
  build-tag:
    description: Forge build tag used for deploy
    value: ${{ steps.compute_build_tag.outputs.build_tag }}
  latest-version-action:
    description: |
      What the LATEST_VERSION update step did: initialized, updated,
      skipped-downgrade, skipped-read-error, or empty when the feature
      wasn't enabled for this run.
    value: ${{ steps.deploy.outputs.latest_version_action }}

runs:
  using: composite
  steps:
    - id: compute_build_tag
      shell: bash
      run: |
        echo "BUILD_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"
        echo "build_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

    - id: build_check
      shell: bash
      env:
        FORGE_CLI: ${{ inputs.forge-cli }}
      run: node "${{ github.action_path }}/check-forge-build.mjs"

    - shell: bash
      if: steps.build_check.outputs.build_exists != 'true'
      run: npm ci

    - shell: bash
      if: steps.build_check.outputs.build_exists != 'true' && inputs.pre-build-command != ''
      run: ${{ inputs.pre-build-command }}

    - shell: bash
      if: steps.build_check.outputs.build_exists != 'true'
      name: forge lint (retry on transient swagger fetch)
      env:
        FORGE_CLI: ${{ inputs.forge-cli }}
      # `forge lint` fetches Atlassian's OpenAPI specs from developer.atlassian.com and
      # intermittently dies mid-response ("Invalid response body … Premature close").
      # That's an upstream outage, not a code defect, and can persist across retries.
      # Strategy: retry a few times; if the ONLY failure is the upstream spec fetch,
      # warn and proceed (code is already gated by ESLint in the pre-build step). A
      # genuine lint failure (anything else) fails fast — no retry, non-zero exit.
      run: |
        set +e  # composite shell runs with `bash -e`; we inspect forge lint's exit code ourselves
        upstream_re='Invalid response body while trying to fetch|Premature close|ECONNRESET|ETIMEDOUT|socket hang up'
        for attempt in 1 2 3; do
          out="$(npx "$FORGE_CLI" lint 2>&1)"; rc=$?
          printf '%s\n' "$out"
          [ "$rc" -eq 0 ] && exit 0
          if printf '%s' "$out" | grep -qiE "$upstream_re"; then
            echo "::warning::forge lint attempt ${attempt}/3: could not fetch Atlassian API specs (developer.atlassian.com upstream issue); retrying…"
            sleep $((attempt * 10))
          else
            echo "::error::forge lint reported problems (not an upstream fetch error)"
            exit "$rc"
          fi
        done
        echo "::warning::forge lint skipped: developer.atlassian.com API specs unreachable after 3 attempts — proceeding (real lint errors would have failed fast; ESLint already passed in pre-build)"
        exit 0

    - shell: bash
      if: steps.build_check.outputs.build_exists != 'true'
      name: forge build (retry on transient Atlassian asset fetch)
      env:
        FORGE_CLI: ${{ inputs.forge-cli }}
      # `forge build` downloads a runtime wrapper asset from atl-paas.net and, like
      # `forge lint`, intermittently dies mid-response ("Premature close"). Unlike lint
      # the build must succeed, so this is a plain retry with backoff — no "proceed".
      run: |
        set +e  # composite shell runs with `bash -e`; inspect the exit code ourselves
        for attempt in 1 2 3 4; do
          npx "$FORGE_CLI" build -t "$BUILD_TAG" --non-interactive --no-verify
          rc=$?
          [ "$rc" -eq 0 ] && exit 0
          echo "::warning::forge build attempt ${attempt}/4 failed (rc=${rc}); retrying…"
          sleep $((attempt * 15))
        done
        echo "::error::forge build failed after 4 attempts"
        exit 1

    - id: build_action
      shell: bash
      run: |
        if [ "${{ steps.build_check.outputs.build_exists }}" = "true" ]; then
          echo "build_action=reused" >> "$GITHUB_OUTPUT"
          echo "Build action: reused existing package for tag $BUILD_TAG"
        else
          echo "build_action=created" >> "$GITHUB_OUTPUT"
          echo "Build action: created new package for tag $BUILD_TAG"
        fi

    - id: target
      shell: bash
      env:
        TARGET_ENVIRONMENT: ${{ inputs.target-environment }}
        SITE_DEVELOPMENT: ${{ inputs.site-development }}
        SITE_STAGING: ${{ inputs.site-staging }}
        SITE_PRODUCTION: ${{ inputs.site-production }}
      run: node "${{ github.action_path }}/resolve-target-site.mjs"

    - id: deploy
      shell: bash
      env:
        FORGE_CLI: ${{ inputs.forge-cli }}
        DEPLOY_ENV: ${{ steps.target.outputs.env }}
        DEPLOY_SITE: ${{ steps.target.outputs.site }}
        BUILD_ACTION: ${{ steps.build_action.outputs.build_action }}
        BUILD_MATCH_COUNT: ${{ steps.build_check.outputs.match_count }}
        MAINTAIN_LATEST_VERSION: ${{ inputs.maintain-latest-version }}
      run: node "${{ github.action_path }}/deploy-forge.mjs"

    - shell: bash
      if: inputs.run-install-non-production == 'true' && steps.deploy.outputs.env != 'production'
      env:
        FORGE_CLI: ${{ inputs.forge-cli }}
        SITE: ${{ steps.deploy.outputs.site }}
        ENV: ${{ steps.deploy.outputs.env }}
      run: |
        LOG=$(mktemp)
        set +e
        npx "$FORGE_CLI" install --non-interactive --upgrade --site "$SITE" --product confluence -e "$ENV" 2>&1 | tee "$LOG"
        RC=${PIPESTATUS[0]}
        set -e
        if [ "$RC" -ne 0 ]; then
          if grep -qi "Could not find an installation" "$LOG"; then
            echo "::notice::No existing installation on $SITE for env $ENV — performing fresh install"
            npx "$FORGE_CLI" install --non-interactive --site "$SITE" --product confluence -e "$ENV"
          else
            exit "$RC"
          fi
        fi

    - shell: bash
      if: inputs.create-release-tag == 'true' && steps.deploy.outputs.env != 'development' && steps.deploy.outputs.version != ''
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        ENV="${{ steps.deploy.outputs.env }}"
        VERSION="${{ steps.deploy.outputs.version }}"
        TAG="forge-${ENV}-v${VERSION}"
        git tag -af "$TAG" -m "Deployed to ${ENV}"
        git push origin "$TAG" --force

    - shell: bash
      if: steps.deploy.outputs.version != ''
      run: |
        ENV="${{ steps.deploy.outputs.env }}"
        VERSION="${{ steps.deploy.outputs.version }}"
        echo "### Deployed to ${ENV}" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Forge version:** \`${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Build action:** \`${{ steps.build_action.outputs.build_action }}\`" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Commit:** \`${GITHUB_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
        if [ "$BUILD_TAG" != "$GITHUB_SHA" ]; then
          echo "- **Build tag:** \`${BUILD_TAG}\`" >> "$GITHUB_STEP_SUMMARY"
        fi
        LV_ACTION="${{ steps.deploy.outputs.latest_version_action }}"
        if [ -n "$LV_ACTION" ]; then
          LV_BEFORE="${{ steps.deploy.outputs.latest_version_before }}"
          LV_AFTER="${{ steps.deploy.outputs.latest_version_after }}"
          echo "- **LATEST_VERSION:** \`${LV_ACTION}\` (\`${LV_BEFORE:-—}\` → \`${LV_AFTER}\`)" >> "$GITHUB_STEP_SUMMARY"
        fi
